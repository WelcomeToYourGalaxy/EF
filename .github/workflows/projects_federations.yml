name: Harvest portal federations (sharded)
# 4 parallel shards, each taking every 4th portal of every federation list
# (CKAN, ODS, GeoNode, DKAN, WFS, OGC API; uData on shard 0). Together the
# shards cover 100% of the portals in one scheduled run, then a merge job
# folds the parts into projects.json -- same pattern as the weekly OSM job.
on:
  schedule:
    - cron: '30 2 * * 1,4'    # Mon + Thu 02:30 UTC (offset from daily 08:00 job)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  shard:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install permitstack requests
      - name: Run federation shard
        env:
          PERMITSTACK_API_KEY: ${{ secrets.PERMITSTACK_API_KEY }}
          FED_SHARD: ${{ matrix.shard }}
          FED_SHARDS: '4'
          FED_SHARD_MAX_MIN: '315'
        run: python harvest_projects.py
      - uses: actions/upload-artifact@v4
        with:
          name: fed-part-${{ matrix.shard }}
          path: fed_part_${{ matrix.shard }}.json
          if-no-files-found: warn

  merge:
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install permitstack requests
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: fed-part-*
          merge-multiple: true
      - name: Merge shard parts into projects.json
        env:
          FED_MERGE: '1'
        run: python harvest_projects.py
      - name: Commit if changed
        run: |
          git config user.name  "projects-bot"
          git config user.email "actions@users.noreply.github.com"
          git add projects.json
          if git diff --staged --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: refresh projects.json (federations)"
          BR="$(git rev-parse --abbrev-ref HEAD)"
          for i in 1 2 3 4 5; do
            git fetch origin "$BR" || true
            if git merge -X ours FETCH_HEAD -m "merge remote; keep fresh projects.json" && git push origin HEAD:"$BR"; then
              echo "pushed"; exit 0
            fi
            git merge --abort 2>/dev/null || true
            echo "push race, retry $i"; sleep 6
          done
          echo "push failed after retries"; exit 1
