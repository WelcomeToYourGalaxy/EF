name: Harvest live projects
on:
  schedule:
    - cron: '0 8 * * *'      # daily at 08:00 UTC
  workflow_dispatch: {}       # allow manual runs
permissions:
  contents: write
jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pandas openpyxl requests
      - name: Harvest projects.json
        run: python harvest_projects.py
      - name: Commit if changed
        run: |
          git config user.name  "projects-bot"
          git config user.email "actions@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "chore: refresh projects.json"
          git push
