name: Harvest resistance wire
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install feedparser
      - name: Harvest wire.json
        run: python wire_harvest.py
      - name: Commit if changed
        run: |
          git config user.name  "wire-bot"
          git config user.email "actions@users.noreply.github.com"
          git add wire.json
          if git diff --staged --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: refresh wire.json"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)" && git push && exit 0
            echo "push race, retry $i"; sleep 6
          done
          echo "push failed after retries"; exit 1
